version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/adapters/postgres/migrations"
    
    schema: "schema.sql"
    gen:
      go:
        package: "repo"
        out: "./internal/adapters/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true